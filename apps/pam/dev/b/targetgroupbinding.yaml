# TargetGroupBinding for Preview Cluster
# This binds the preview-cluster service to the ALB target group

apiVersion: elbv2.k8s.aws/v1beta1
kind: TargetGroupBinding
metadata:
  name: pam-preview-cluster-tgb
  namespace: demo
spec:
  # Replace this with actual target group ARN after terraform apply
  # Get it from: terraform output preview_cluster_target_group_arn
  targetGroupARN: arn:aws:elasticloadbalancing:ap-east-1:333347968576:targetgroup/aop-sandbox-preview-tg/15fce2085b606c57

  # Target type must match what you set in Terraform (ip or instance)
  targetType: ip

  # Service reference
  serviceRef:
    name: pam-preview-cluster
    port: 80