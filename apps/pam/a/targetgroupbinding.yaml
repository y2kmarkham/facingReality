# TargetGroupBinding for Active Cluster
# This binds the active-cluster service to the ALB target group

apiVersion: elbv2.k8s.aws/v1beta1
kind: TargetGroupBinding
metadata:
  name: pam-active-cluster-tgb
  namespace: demo
spec:
  # Replace this with actual target group ARN after terraform apply
  # Get it from: terraform output active_cluster_target_group_arn
  targetGroupARN: arn:aws:elasticloadbalancing:ap-east-1:333347968576:targetgroup/aop-sandbox-active-tg/95213b50e1384325

  # Target type must match what you set in Terraform (ip or instance)
  targetType: ip

  # Service reference
  serviceRef:
    name: pam-active-cluster
    port: 80
