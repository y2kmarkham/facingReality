{{- range .Values.projects }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .name }}
  namespace: argocd
  labels:
    app: {{ .name }}
    env: dev
    cluster: a
spec:
  project: {{ .name }}
  sources:
    # Source 1: the values file — exposed as $values
    - repoURL: https://github.com/y2kmarkham/facingReality.git
      targetRevision: main
      ref: values
    # Source 2: the helm chart, referencing values from Source 1
    - repoURL: https://github.com/y2kmarkham/facingReality.git
      targetRevision: main
      path: 'templates/{{ .name }}'
      helm:
        valueFiles:
          - '$values/apps/{{ .name }}/dev/values.yaml'
          - '$values/apps/{{ .name }}/dev/values-override-a.yaml'
        ignoreMissingValueFiles: true
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .name }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
