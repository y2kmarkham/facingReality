apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.appName }}-html
data:
  nginx.conf: |
    server {
        listen 80;
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
        location /{{ .Values.appName }} {
            alias /usr/share/nginx/html/;
            index index.html;
        }
        location /{{ .Values.appName }}/ {
            alias /usr/share/nginx/html/;
            index index.html;
        }
    }
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>{{ .Values.appTitle }}</title>
        <style>
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
                font-family: Arial, sans-serif;
                font-size: 48px;
                background-color: {{ .Values.bgColor }};
                color: white;
            }
        </style>
    </head>
    <body>
        <div>{{ .Values.displayText }}</div>
    </body>
    </html>
